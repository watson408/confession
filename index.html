<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致我最爱的你 ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 背景渐变动画 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            z-index: -2;
            animation: bgShift 10s infinite alternate;
        }

        @keyframes bgShift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(20deg); }
        }

        /* 中心卡片 */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 90%;
            width: 400px;
            z-index: 10;
            backdrop-filter: blur(10px);
            transform: translateY(20px);
            opacity: 0;
            animation: floatUp 1s forwards 0.5s;
        }

        @keyframes floatUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .typing-text {
            font-size: 1.1em;
            color: #555;
            min-height: 80px;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: left;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #ff4d6d;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        .btn-no {
            background: #eee;
            color: #888;
        }

        .btn-no:hover {
            background: #ddd;
        }

        /* 烟花画布 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* 让点击穿透到 body */
        }

        /* 成功后的遮罩 */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }
        
        .success-overlay h2 {
            font-size: 3em;
            color: #ff4d6d;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        /* 漂浮的小爱心背景 */
        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            animation: floatHeart 15s linear infinite;
            z-index: 0;
            user-select: none;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- 背景漂浮爱心容器 -->
    <div id="bg-hearts"></div>

    <!-- 烟花画布 -->
    <canvas id="fireworks"></canvas>

    <!-- 主卡片 -->
    <div class="card">
        <h1>❤️ 特别的日子</h1>
        <div class="typing-text" id="text-area"><span class="cursor"></span></div>
        
        <div class="btn-group">
            <button class="btn-yes" onclick="agree()">我愿意！✨</button>
            <button class="btn-no" onclick="disagree()">再想想...</button>
        </div>
    </div>

    <!-- 成功弹窗 -->
    <div class="success-overlay" id="success-screen">
        <h2>🎉 答应啦！🎉</h2>
        <p style="font-size: 1.5em;">余生请多指教！💕</p>
        <p style="margin-top: 20px; font-size: 0.9em; opacity: 0.8;">(截图发给我吧~)</p>
    </div>

    <script>
        // --- 1. 配置区域 (在这里修改你的话) ---
        const loveText = "亲爱的欧阳，\n\n从遇见你的那一刻起，我的世界就变得不一样了。\n每一个和你在一起的瞬间，都像烟花一样绚烂。\n\n今天，我想问你：\n愿意做我女朋友，陪我一起看遍世间风景吗？";
        // ------------------------------------

        // --- 打字机效果 ---
        const textArea = document.getElementById('text-area');
        let i = 0;
        function typeWriter() {
            if (i < loveText.length) {
                const char = loveText.charAt(i);
                if (char === '\n') {
                    textArea.innerHTML += '<br>';
                } else {
                    textArea.innerHTML = textArea.innerHTML.replace('<span class="cursor"></span>', '') + char + '<span class="cursor"></span>';
                }
                i++;
                setTimeout(typeWriter, 100); // 打字速度
            }
        }
        setTimeout(typeWriter, 1000); // 延迟开始

        // --- 背景漂浮爱心 ---
        function createBgHearts() {
            const container = document.getElementById('bg-hearts');
            for(let j=0; j<15; j++) {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(heart);
            }
        }
        createBgHearts();

        // --- 按钮逻辑 ---
        function disagree() {
            alert("不许拒绝！再点一次试试？😤");
            // 这里可以加个调皮的效果，比如按钮逃跑，暂时先简单提示
        }

        function agree() {
            document.getElementById('success-screen').style.display = 'flex';
            // 触发超级烟花
            for(let k=0; k<50; k++) {
                setTimeout(() => {
                    createFirework(window.innerWidth/2, window.innerHeight/2);
                }, k * 100);
            }
        }

        // --- 炫酷烟花系统 (核心部分) ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // 点击屏幕任意位置放烟花
        document.body.addEventListener('click', (e) => {
            // 如果点在按钮上就不放烟花，避免误触，但为了炫，我们允许全屏点
            if(e.target.tagName !== 'BUTTON') {
                createFirework(e.clientX, e.clientY);
            }
        });

        function createFirework(x, y) {
            const particleCount = 100; // 粒子数量
            const colors = ['#ff4d6d', '#ff8fa3', '#fff0f3', '#ffd700', '#00d2fc', '#bd00ff'];
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15, // 水平速度
                    vy: (Math.random() - 0.5) * 15, // 垂直速度
                    life: 100 + Math.random() * 50, // 寿命
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 3 + 1,
                    gravity: 0.2 // 重力
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity; // 应用重力
                p.life--;
                p.size *= 0.96; // 逐渐变小

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();

                if (p.life <= 0 || p.size < 0.5) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 自动放几个开场烟花
        setTimeout(() => createFirework(window.innerWidth/2, window.innerHeight/3), 1500);
        setTimeout(() => createFirework(window.innerWidth/3, window.innerHeight/2), 2000);
        setTimeout(() => createFirework(window.innerWidth*2/3, window.innerHeight/2), 2500);

    </script>
</body>
</html>
